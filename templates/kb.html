<!doctype html>
<html><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>iPad Keyboard</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing:border-box; -webkit-user-select:none; user-select:none;
      -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; background:#0f1115; color:#e6e8ec;
              font-family:-apple-system,system-ui,sans-serif; overflow:hidden; }
  #wrap { display:flex; flex-direction:column; height:100%; padding:8px; gap:7px; }
  #status { font-size:12px; color:#8b93a3; text-align:center; }
  #status.ok { color:#5fd08a; }
  .strip { display:flex; gap:5px; }
  .strip.fk { flex-wrap:wrap; }
  button { flex:1; padding:11px 3px; font-size:14px; border:none; border-radius:8px;
           background:#222732; color:#e6e8ec; min-width:0; }
  button:active { background:#2e3543; }
  button.fk { flex:0 0 auto; min-width:46px; font-size:12px; }
  button.mod { background:#2a3550; font-weight:600; }
  button.mod.armed { background:#3b82f6; color:#fff; }
  button.mod.locked { background:#9333ea; color:#fff; }
  button.deliver { background:#15803d; color:#fff; font-weight:700; }
  button.deliver:active { background:#1f9d4d; }
  button.enter { background:#2563eb; color:#fff; font-weight:700; }
  button.enter:active { background:#3b82f6; }
  .main { display:flex; gap:7px; min-height:60vh; }
  .capwrap { flex:1 1 auto; display:flex; flex-direction:column; min-width:0; }
  #cap { flex:1 1 auto; min-height:240px; font-size:18px; line-height:1.5; background:#0e1117;
         color:#0e1117; caret-color:transparent; border:1px solid #2a2f3a; border-radius:10px;
         padding:11px; resize:none; outline:none; box-sizing:border-box;
         -webkit-user-select:text; user-select:text; }
  #cap::placeholder { color:#0e1117; }
  #trackpad { flex:0 0 38%; min-width:38%; max-width:38%; align-self:stretch; background:#13161c; border:1px dashed #2a2f3a;
              border-radius:10px; display:flex; align-items:center;
              justify-content:center; color:#4b5563; font-size:12px;
              text-align:center; touch-action:none; line-height:1.6; }
  #trackpad.active { background:#1a1f29; border-color:#3b82f6; }
  .send { background:#1f7a44 !important; color:#eafff1 !important; font-weight:700; border-color:#2ea866 !important; }
  .send:active { background:#279152 !important; }
  .sec { font-size:9px; color:#4b5563; text-transform:uppercase;
         letter-spacing:.05em; margin:1px 0 -3px 2px; }
  .hint { font-size:10px; color:#6b7280; text-align:center; }
</style></head>
<body>
<div id="wrap">
  <div id="status">connecting...</div>

  <div class="sec">modifiers (tap = next key, double-tap = lock) &mdash; for Windows commands</div>
  <div class="strip">
    <button class="mod" data-mod="ctrl">Ctrl</button>
    <button class="mod" data-mod="shift">Shift</button>
    <button class="mod" data-mod="alt">Alt</button>
    <button class="mod" data-mod="win">Win</button>
    <button data-k="escape">Esc</button>
    <button id="sendbtn" class="send">SEND &#9166;</button>
  </div>
  <div class="strip">
    <button data-k="home">Home</button>
    <button data-k="left">&#8592;</button>
    <button data-k="up">&#8593;</button>
    <button data-k="down">&#8595;</button>
    <button data-k="right">&#8594;</button>
    <button data-k="end">End</button>
    <button data-k="delete">Del</button>
  </div>

  <div class="sec">function keys</div>
  <div class="strip fk">
    <button class="fk" data-k="f1">F1</button><button class="fk" data-k="f2">F2</button>
    <button class="fk" data-k="f3">F3</button><button class="fk" data-k="f4">F4</button>
    <button class="fk" data-k="f5">F5</button><button class="fk" data-k="f6">F6</button>
    <button class="fk" data-k="f7">F7</button><button class="fk" data-k="f8">F8</button>
    <button class="fk" data-k="f9">F9</button><button class="fk" data-k="f10">F10</button>
    <button class="fk" data-k="f11">F11</button><button class="fk" data-k="f12">F12</button>
  </div>

  <div class="main">
    <div class="capwrap">
      <textarea id="cap" placeholder="" autocapitalize="sentences" autocomplete="on"
                autocorrect="on" spellcheck="true" aria-label="key capture"></textarea>
    </div>
    <div id="trackpad">drag = move<br>tap = click<br>2 fingers tap = right<br>2 fingers drag = scroll</div>
  </div>

  <div class="hint">Type and watch the laptop. SEND = Enter on the laptop. Return = page break.</div>
</div>

<script>
const status=document.getElementById('status');
const cap=document.getElementById('cap');

// --- modifier state + helpers (these were referenced but missing; defining them) ---
var mods = {ctrl:'off', shift:'off', alt:'off', win:'off'};  // off | armed | locked
function activeMods(){
  var out=[];
  for(var k in mods){ if(mods[k]==='armed' || mods[k]==='locked') out.push(k); }
  return out;
}
function consumeOneShots(){
  for(var k in mods){ if(mods[k]==='armed') mods[k]='off'; }
  refreshModUI();
}
function refreshModUI(){
  document.querySelectorAll('button[data-mod]').forEach(function(b){
    var n=b.getAttribute('data-mod'); var st=mods[n]||'off';
    b.classList.remove('armed','locked');
    if(st==='armed') b.classList.add('armed');
    else if(st==='locked') b.classList.add('locked');
  });
}
function setOK(){ if(status){ status.textContent='ready'; status.style.color='#5fd08a'; } }
function setErr(msg){ if(status){ status.textContent=msg||'error'; status.style.color='#e0a458'; } }

const trackpad=document.getElementById('trackpad');
let ws=null, wsReady=false, queue=[];

// ===== WebRTC transport (portable: works from any network) =====
var ENGINE="https://web-production-7eaf8.up.railway.app";
var DIAG_KEY="Gj7NvkTfuV5SMzJR9I6ZoWHiPLQC0rx8dDFB3Awn";
var SELF_SEAT="kb_ipad", PEER_SEAT="kb_laptop";
var pc=null, dc=null, dcReady=false;

function mbPost(path, body){
  return fetch(ENGINE+path,{method:"POST",
    headers:{"Content-Type":"application/json","X-Diag-Key":DIAG_KEY},
    body:JSON.stringify(body)}).then(function(r){return r.json();});
}
function mbSend(kind, body){
  return mbPost("/diag/op/mailbox_send",{from_seat:SELF_SEAT,to_seat:PEER_SEAT,kind:kind,body:JSON.stringify(body)});
}
function mbFetch(){ return mbPost("/diag/op/mailbox_fetch",{seat:SELF_SEAT}); }
function mbAck(id){ return mbPost("/diag/op/mailbox_ack",{seat:SELF_SEAT,msg_id:id}); }

async function waitForAnswer(){
  for(var i=0;i<60;i++){
    var r=await mbFetch();
    if(r && r.message){
      var b=JSON.parse(r.message.body); await mbAck(r.message.msg_id);
      if(b.type==="answer") return b;
    }
    await new Promise(function(res){setTimeout(res,500);});
  }
  return null;
}

async function connectWS(){   // name kept so the rest of the page's calls work unchanged
  try{
    setErr("connecting (webrtc)...");
    pc=new RTCPeerConnection({iceServers:[{urls:"stun:stun.l.google.com:19302"}]});
    dc=pc.createDataChannel("kb",{ordered:false,maxRetransmits:0}); // low-latency, UDP-like
    dc.onopen=function(){ dcReady=true; setOK();
      while(queue.length){ try{dc.send(JSON.stringify(queue.shift()));}catch(e){} } };
    dc.onclose=function(){ dcReady=false; setErr("disconnected"); };
    pc.onconnectionstatechange=function(){
      if(pc.connectionState==="failed"||pc.connectionState==="disconnected"){ dcReady=false; setErr("reconnecting..."); setTimeout(restart,800); } };
    setErr("creating offer...");
    var offer=await pc.createOffer();
    await pc.setLocalDescription(offer);
    // Wait briefly for ICE candidates, but ALWAYS proceed (iOS Safari often never
    // fires gatheringState 'complete'). Use icecandidate null-signal OR a hard 1.5s cap.
    setErr("gathering network info...");
    await new Promise(function(res){
      var done=false;
      function finish(){ if(!done){done=true; res();} }
      if(pc.iceGatheringState==="complete") return finish();
      pc.addEventListener("icegatheringstatechange",function(){ if(pc.iceGatheringState==="complete") finish(); });
      pc.addEventListener("icecandidate",function(e){ if(e.candidate===null) finish(); });
      setTimeout(finish,1500); // hard cap — proceed regardless
    });
    setErr("sending offer to laptop...");
    var sres=await mbSend("note",{type:"offer",sdp:pc.localDescription.sdp}).catch(function(err){ setErr("send failed: "+err.message); return null; });
    if(!sres){ setTimeout(restart,2000); return; }
    setErr("waiting for laptop...");
    var ans=await waitForAnswer();
    if(!ans){ setErr("no laptop answer — is the receiver running?"); setTimeout(restart,2000); return; }
    await pc.setRemoteDescription({type:"answer",sdp:ans.sdp});
  }catch(e){ setErr("webrtc error: "+e.message); setTimeout(restart,2000); }
}
function restart(){ try{if(pc)pc.close();}catch(e){} dcReady=false; connectWS(); }

function send(ev){
  if(dcReady){ try{ dc.send(JSON.stringify(ev)); return; }catch(e){ dcReady=false; } }
  queue.push(ev); if(queue.length>1000) queue.shift();
}



function postKey(ev){ /* unused in webrtc */ }


// GREEN: deliver the composed block into the app (no Enter). Keeps text so you
// can review/add; clears after delivering so the next block starts fresh.
// BLUE: the one real Enter.


// LIVE keyboard (v11 HYBRID capture): letters via the INPUT event on a real
// visible textarea -- the path iOS Safari reliably fires for character keys
// (it does NOT fire keydown for letters on the soft keyboard; that was the v10
// bug, proven by the event log showing zero char events). Special keys
// (Enter/Tab/Backspace) DO fire keydown on iOS, so those go through keydown.
// WebSocket transport underneath. Visible box = a second cursor, accepted as
// the lesser evil vs letters not typing at all.
function pushEcho(s){ /* no visible readout */ }
function syncEcho(){ /* no visible readout */ }
var last='';
cap.addEventListener('input', function(e){
  var now=cap.value;
  var m=activeMods();
  if(now.length>last.length && now.indexOf(last)===0){
    var added=now.slice(last.length);
    if(m.length && added.length===1){ send({t:'chord',mods:m,key:added}); consumeOneShots(); }
    else { for(var i=0;i<added.length;i++){ var ch=added[i]; if(ch==='\n'){ /* page break only â€” inert */ } else send({t:'char',v:ch}); } }
    pushEcho(added);
  } else if(now.length<last.length && last.indexOf(now)===0){
    var n=last.length-now.length;
    for(var j=0;j<n;j++){ send({t:'key',v:'backspace'}); }
  } else if(now!==last){
    var k=0, L=Math.min(now.length,last.length);
    while(k<L && now[k]===last[k]) k++;
    for(var b=0;b<last.length-k;b++) send({t:'key',v:'backspace'});
    var tail=now.slice(k);
    for(var t=0;t<tail.length;t++){ var c2=tail[t]; if(c2==='\n'){ /* page break only â€” inert */ } else send({t:'char',v:c2}); }
    pushEcho(tail);
  }
  last=now; syncEcho();
});
// Special keys that iOS DOES fire keydown for. Letters are handled by input above.
cap.addEventListener('keydown', function(e){
  var key=e.key; var m=activeMods();
  if(key==='Enter'){ // Return = paragraph break = Shift+Enter (newline WITHOUT submitting in chat apps).
    if(m.length){ send({t:'chord',mods:m,key:'enter'}); consumeOneShots(); }
    else { send({t:'chord',mods:['shift'],key:'enter'}); }
    // newline also lands in invisible box for iOS context; input handler ignores \n.
    return;
  }
  if(key==='Tab'){ if(m.length){send({t:'chord',mods:m,key:'tab'});consumeOneShots();}else send({t:'key',v:'tab'}); e.preventDefault(); return; }
  // Backspace: only emit here if the box is already empty (otherwise input-diff handles it)
  if(key==='Backspace' && cap.value===''){ send({t:'key',v:'backspace'}); return; }
});

// named keys with optional modifier chord
document.querySelectorAll('button[data-k]').forEach(b=>{
  b.addEventListener('click',e=>{e.preventDefault();
    const name=b.getAttribute('data-k'); const m=activeMods();
    if(m.length){send({t:'chord',mods:m,key:name});consumeOneShots();}
    else send({t:'key',v:name});
    cap.focus();});
});

// modifier buttons: tap=arm, double-tap=lock
document.querySelectorAll('button[data-mod]').forEach(b=>{
  const name=b.getAttribute('data-mod'); let tt=null;
  b.addEventListener('click',e=>{e.preventDefault();
    if(tt){clearTimeout(tt);tt=null;mods[name]=(mods[name]==='locked')?'off':'locked';refreshModUI();cap.focus();return;}
    tt=setTimeout(()=>{tt=null;mods[name]=(mods[name]==='off')?'armed':'off';refreshModUI();cap.focus();},230);});
});

// trackpad
let lastX=0,lastY=0,moved=false,startT=0,twoFinger=false,lastScrollY=0;
const TAP_MS=250,TAP_SLOP=8,SENS=1.6;
trackpad.addEventListener('touchstart',e=>{e.preventDefault();trackpad.classList.add('active');
  twoFinger=e.touches.length>=2;const t=e.touches[0];lastX=t.clientX;lastY=t.clientY;lastScrollY=t.clientY;
  moved=false;startT=Date.now();},{passive:false});
trackpad.addEventListener('touchmove',e=>{e.preventDefault();const t=e.touches[0];
  if(e.touches.length>=2){const dy=t.clientY-lastScrollY;lastScrollY=t.clientY;
    if(Math.abs(dy)>1){send({t:'scroll',a:Math.round(dy*4)});moved=true;}return;}
  const dx=t.clientX-lastX,dy=t.clientY-lastY;
  if(Math.abs(dx)>TAP_SLOP||Math.abs(dy)>TAP_SLOP)moved=true;
  if(dx||dy)send({t:'move',dx:dx*SENS,dy:dy*SENS});
  lastX=t.clientX;lastY=t.clientY;},{passive:false});
trackpad.addEventListener('touchend',e=>{e.preventDefault();trackpad.classList.remove('active');
  const quick=(Date.now()-startT)<TAP_MS;
  if(quick&&!moved)send({t:'click',b:twoFinger?'right':'left'});
  twoFinger=false;},{passive:false});

var sendbtn=document.getElementById('sendbtn');
if(sendbtn){ sendbtn.addEventListener('click', function(e){ e.preventDefault();
  var m=activeMods();
  if(m.length){ send({t:'chord',mods:m,key:'enter'}); consumeOneShots(); }
  else { send({t:'key',v:'enter'}); }
  pushEcho(' [SENT] '); cap.focus();
}); }
connectWS();

refreshModUI(); cap.focus();
</script>
</body></html>
