<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ontinuity — Problem Discovery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0e0f11;
    --bg2:       #15171a;
    --bg3:       #1c1f23;
    --border:    #2a2d32;
    --gold:      #c9a84c;
    --gold-dim:  #7a6530;
    --text:      #e8e4dc;
    --text-dim:  #7a7672;
    --text-mid:  #a8a49c;
    --guide:     #d4cfc6;
    --user:      #e8e4dc;
    --radius:    12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── HEADER ── */
  header {
    width: 100%;
    max-width: 720px;
    padding: 32px 24px 0;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo {
    width: 36px;
    height: 36px;
    flex-shrink: 0;
  }

  .brand {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.04em;
  }

  .brand-sub {
    font-size: 12px;
    font-weight: 300;
    color: var(--text-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* ── CONVERSATION AREA ── */
  .conversation {
    width: 100%;
    max-width: 720px;
    flex: 1;
    padding: 40px 24px 24px;
    display: flex;
    flex-direction: column;
    gap: 0;
    overflow-y: auto;
  }

  .message {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 20px 0;
    border-bottom: 1px solid var(--border);
    opacity: 0;
    transform: translateY(8px);
    animation: fadeUp 0.4s ease forwards;
  }

  .message:last-child {
    border-bottom: none;
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-role {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  .msg-role.guide { color: var(--gold-dim); }
  .msg-role.user  { color: var(--text-dim); }

  .msg-text {
    font-size: 16px;
    line-height: 1.75;
    color: var(--guide);
    font-weight: 300;
  }

  .msg-text.user-text {
    color: var(--user);
    font-weight: 400;
  }

  /* ── THINKING INDICATOR ── */
  .thinking {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 20px 0;
    color: var(--text-dim);
    font-size: 14px;
    font-weight: 300;
  }

  .dots {
    display: flex;
    gap: 4px;
  }

  .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--gold-dim);
    animation: pulse 1.4s ease-in-out infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* ── INPUT AREA ── */
  .input-area {
    width: 100%;
    max-width: 720px;
    padding: 0 24px 36px;
    position: sticky;
    bottom: 0;
    background: linear-gradient(to bottom, transparent, var(--bg) 30%);
  }

  .input-wrap {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    align-items: flex-end;
    gap: 8px;
    padding: 14px 14px 14px 18px;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within {
    border-color: var(--gold-dim);
  }

  textarea {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 300;
    line-height: 1.6;
    resize: none;
    /* Roomy by default so a paragraph is visible at a glance, and grows tall
       before it ever scrolls — the user can scan back over what they typed. */
    min-height: 76px;
    max-height: 40vh;
    overflow-y: auto;
  }

  textarea::placeholder {
    color: var(--text-dim);
  }

  .send-btn {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    border: none;
    background: var(--gold);
    color: var(--bg);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.1s;
  }

  .send-btn:hover { background: #d9b85c; }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; }

  .send-btn svg {
    width: 16px;
    height: 16px;
  }

  .hint {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 8px;
    text-align: center;
    font-weight: 300;
  }

  /* ── COMPLETION SCREEN ── */
  .completion {
    width: 100%;
    max-width: 720px;
    padding: 40px 24px;
    display: none;
    flex-direction: column;
    gap: 24px;
    animation: fadeUp 0.5s ease forwards;
  }

  .completion.visible {
    display: flex;
  }

  .completion-header {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .check {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1.5px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .completion h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 600;
    color: var(--gold);
  }

  .summary-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
  }

  .summary-card h3 {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 16px;
  }

  #summary-content {
    font-size: 14px;
    line-height: 1.8;
    color: var(--text-mid);
    font-weight: 300;
    white-space: pre-wrap;
  }

  .dl-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .dl-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    background: none;
    border: 1px solid var(--gold-dim);
    border-radius: 8px;
    color: var(--gold);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 400;
    cursor: pointer;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: background 0.2s, border-color 0.2s;
    align-self: flex-start;
  }

  .dl-btn:hover {
    background: rgba(201, 168, 76, 0.08);
    border-color: var(--gold);
  }

  /* ── PROGRESS ── */
  .progress {
    width: 100%;
    max-width: 720px;
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .progress-bar {
    flex: 1;
    height: 2px;
    background: var(--bg3);
    border-radius: 1px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--gold-dim);
    border-radius: 1px;
    transition: width 0.6s ease;
    width: 0%;
  }

  .progress-label {
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 300;
    white-space: nowrap;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <svg class="logo" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
    <polygon points="18,2 32,10 32,26 18,34 4,26 4,10"
             fill="none" stroke="#c9a84c" stroke-width="1.2" opacity="0.6"/>
    <polygon points="18,7 27,12 27,24 18,29 9,24 9,12"
             fill="none" stroke="#c9a84c" stroke-width="1.2" opacity="0.4"/>
    <circle cx="18" cy="18" r="3" fill="#c9a84c" opacity="0.8"/>
  </svg>
  <div>
    <div class="brand">Ontinuity</div>
    <div class="brand-sub">Problem Discovery</div>
  </div>
</header>

<div class="progress" id="progressBar">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel">Beginning</div>
</div>

<div class="conversation" id="conversation"></div>

<div class="completion" id="completion">
  <div class="completion-header">
    <div class="check">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M4 9l4 4 6-7" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h2>Discovery Complete</h2>
  </div>
  <div class="summary-card">
    <h3>What We Captured</h3>
    <div id="summary-content"></div>
  </div>
  <div class="dl-row">
    <button class="dl-btn" id="dlSummaryBtn">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M7 2v7M4 7l3 3 3-3M2 11h10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      Download summary
    </button>
    <button class="dl-btn" id="dlDataBtn">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M7 2v7M4 7l3 3 3-3M2 11h10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      Download workspace data
    </button>
  </div>
</div>

<div class="input-area" id="inputArea">
  <div class="input-wrap">
    <textarea id="userInput" placeholder="Type your response…" rows="1"></textarea>
    <button class="send-btn" id="sendBtn" disabled>
      <svg viewBox="0 0 16 16" fill="none">
        <path d="M8 13V3M3 8l5-5 5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
  <div class="hint">Press Enter to send · Shift+Enter for new line · Your answers are saved as you go</div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────
// All model access goes through the Ontinuity backend. No keys in the page,
// no user configuration. The backend holds the provider key server-side and
// is provider-agnostic — change the provider there, not here.
const INTAKE_ENDPOINT  = 'https://web-production-7eaf8.up.railway.app/intake_chat';
const CAPTURE_ENDPOINT = 'https://web-production-7eaf8.up.railway.app/intake_capture';

// ── STATE ─────────────────────────────────────────────────────────────────
let history         = [];
let workspaceData   = null;
let exchangeCount   = 0;
let isThinking      = false;
let closingText     = '';
// One ID per session. If the link carries a key (?k=azz), the ID derives from
// it — so the same personalized link always maps to the same session file,
// across any number of sittings. No key → random ID per page load.
const _urlKey = (new URLSearchParams(location.search).get('k') || '').replace(/[^a-zA-Z0-9_-]/g, '').slice(0, 40);
const sessionId = _urlKey
  ? 'K' + _urlKey
  : 'S' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8);

// Fire-and-forget capture: sends the FULL transcript so far. Each call
// overwrites the previous checkpoint server-side, so the latest capture is
// always the complete session to that moment. Failures are silent — capture
// must never interrupt the conversation.
function captureSession(isFinal, wsData, wsRaw) {
  try {
    fetch(CAPTURE_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        session_id: sessionId,
        seq: history.length,   // monotonic checkpoint number, survives resumes
        transcript: history,
        workspace_state: wsData || null,
        // Raw block text is sent on the final capture even when JSON.parse
        // failed (wsData null). A malformed-but-present block must persist so
        // it can be repaired server-side — never silently dropped.
        workspace_state_raw: wsRaw || null,
        final: !!isFinal
      }),
      keepalive: true  // lets a final capture survive tab close mid-flight
    }).catch(() => {});
  } catch (e) { /* never let capture break the page */ }
}

const conversation  = document.getElementById('conversation');
const userInput     = document.getElementById('userInput');
const sendBtn       = document.getElementById('sendBtn');
const inputArea     = document.getElementById('inputArea');
const completionEl  = document.getElementById('completion');
const progressFill  = document.getElementById('progressFill');
const progressLabel = document.getElementById('progressLabel');

// ── RENDER ────────────────────────────────────────────────────────────────
function addMessage(role, text) {
  // Strip workspace state from display
  const displayText = text.replace(/\[WORKSPACE_STATE\][\s\S]*?\[\/WORKSPACE_STATE\]/g, '').trim();
  if (!displayText) return;

  const div = document.createElement('div');
  div.className = 'message';

  const roleEl = document.createElement('div');
  roleEl.className = `msg-role ${role === 'assistant' ? 'guide' : 'user'}`;
  roleEl.textContent = role === 'assistant' ? 'Ontinuity Guide' : 'You';

  const textEl = document.createElement('div');
  textEl.className = `msg-text ${role === 'user' ? 'user-text' : ''}`;
  textEl.textContent = displayText;

  div.appendChild(roleEl);
  div.appendChild(textEl);
  conversation.appendChild(div);

  // Scroll after animation frame so layout is complete
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      div.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });
}

function showThinking() {
  const div = document.createElement('div');
  div.className = 'thinking';
  div.id = 'thinking';
  div.innerHTML = `<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><span>Thinking</span>`;
  conversation.appendChild(div);
  requestAnimationFrame(() => {
    div.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });
}

function hideThinking() {
  const t = document.getElementById('thinking');
  if (t) t.remove();
}

function updateProgress() {
  const pct = Math.min(95, (exchangeCount / 20) * 100);
  progressFill.style.width = pct + '%';
  if      (exchangeCount < 4)  progressLabel.textContent = 'Getting started';
  else if (exchangeCount < 8)  progressLabel.textContent = 'Building context';
  else if (exchangeCount < 14) progressLabel.textContent = 'Going deeper';
  else if (exchangeCount < 18) progressLabel.textContent = 'Almost there';
  else                         progressLabel.textContent = 'Wrapping up';
}

function extractWorkspaceState(text) {
  const m = text.match(/\[WORKSPACE_STATE\]([\s\S]*?)\[\/WORKSPACE_STATE\]/);
  if (!m) return null;
  try { return JSON.parse(m[1].trim()); } catch { return null; }
}

// Returns the RAW block text if a WORKSPACE_STATE block is present at all,
// regardless of whether it is valid JSON. Completion is signalled by the
// block's PRESENCE — a strict JSON.parse must never gate whether the final
// capture fires, or a rich (large, quote-heavy) intake silently fails to save.
function extractWorkspaceRaw(text) {
  const m = text.match(/\[WORKSPACE_STATE\]([\s\S]*?)\[\/WORKSPACE_STATE\]/);
  return m ? m[1].trim() : null;
}

function showCompletion(text, data) {
  progressFill.style.width = '100%';
  progressLabel.textContent = 'Complete';
  inputArea.style.display   = 'none';
  completionEl.classList.add('visible');
  workspaceData = data;

  // Readable summary = the model's closing words (state block stripped)
  const clean = text.replace(/\[WORKSPACE_STATE\][\s\S]*?\[\/WORKSPACE_STATE\]/g, '').trim();
  closingText = clean;
  document.getElementById('summary-content').textContent = clean;

  // Deliverable 1: human-readable summary (for the person who answered)
  document.getElementById('dlSummaryBtn').addEventListener('click', () => {
    const name = (data && data.business && data.business.name) ? data.business.name : 'organization';
    const header = `ONTINUITY — PROBLEM DISCOVERY SUMMARY\n${name}\n${new Date().toLocaleString()}\n\n`;
    const blob = new Blob([header + clean], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `ontinuity_discovery_summary_${Date.now()}.txt`;
    a.click();
  });

  // Deliverable 2: structured workspace data (for the system / future crawler)
  document.getElementById('dlDataBtn').addEventListener('click', () => {
    // If the structured data parsed, hand back clean JSON. If it didn't parse
    // (rich block that failed strict JSON), the data is still safe server-side
    // via the raw capture; locally we hand back the readable summary so the
    // button never produces a "null" file.
    const payload = data ? JSON.stringify(data, null, 2) : clean;
    const blob = new Blob([payload], { type: data ? 'application/json' : 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `ontinuity_intake_${Date.now()}.${data ? 'json' : 'txt'}`;
    a.click();
  });
}

// ── API CALL ──────────────────────────────────────────────────────────────
// Single path: the Ontinuity backend proxy. Provider-agnostic by design.
async function callModel(messages) {
  const res = await fetch(INTAKE_ENDPOINT, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages })
  });
  if (!res.ok) {
    let detail = '';
    try { detail = (await res.json()).error || ''; } catch {}
    throw new Error(detail || `Request failed (${res.status})`);
  }
  const d = await res.json();
  return d.reply;
}

// ── SEND ──────────────────────────────────────────────────────────────────
async function sendMessage(userText) {
  if (isThinking) return;
  isThinking = true;
  sendBtn.disabled = true;

  if (userText) {
    history.push({ role: 'user', content: userText });
    addMessage('user', userText);
    exchangeCount++;
    updateProgress();
  }

  showThinking();

  try {
    const reply = await callModel(history);
    hideThinking();

    history.push({ role: 'assistant', content: reply });

    const wsRaw = extractWorkspaceRaw(reply);
    if (wsRaw) {
      // A WORKSPACE_STATE block is present → this is the closing turn.
      // wsData may be null if the block didn't parse as strict JSON; we still
      // fire the FINAL capture and send the raw block so nothing is lost.
      // Final capture FIRST — before rendering — so even an instant tab-close
      // after the finish screen loses nothing.
      const wsData = extractWorkspaceState(reply);
      captureSession(true, wsData, wsRaw);
      addMessage('assistant', reply);
      showCompletion(reply, wsData);
    } else {
      addMessage('assistant', reply);
      // Checkpoint after every completed exchange — full transcript so far.
      captureSession(false, null, null);
    }
  } catch (e) {
    hideThinking();
    addMessage('assistant', 'I ran into a connection issue reaching the system. Please try sending that again.');
    console.error(e);
  }

  isThinking = false;
  sendBtn.disabled = false;
  userInput.focus();
}

// ── INPUT HANDLING ────────────────────────────────────────────────────────
userInput.addEventListener('input', () => {
  userInput.style.height = 'auto';
  userInput.style.height = userInput.scrollHeight + 'px';
  sendBtn.disabled = userInput.value.trim() === '' || isThinking;
});

userInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const text = userInput.value.trim();
    if (text && !isThinking) {
      userInput.value = '';
      userInput.style.height = 'auto';
      sendBtn.disabled = true;
      sendMessage(text);
    }
  }
});

sendBtn.addEventListener('click', () => {
  const text = userInput.value.trim();
  if (text && !isThinking) {
    userInput.value = '';
    userInput.style.height = 'auto';
    sendBtn.disabled = true;
    sendMessage(text);
  }
});

// ── INIT ──────────────────────────────────────────────────────────────────
// Resume-aware startup. If a prior session exists for this session ID, restore
// the full transcript (the model resumes in its own voice, in-context) and ask
// for a return greeting. A finished session re-shows its completion screen.
// Otherwise, start fresh.

function renderHistory() {
  for (const m of history) {
    // Hide bootstrap and resume markers — internal steering, not conversation.
    if (m.role === 'user' && (m.content.startsWith('Begin the discovery') || m.content.startsWith('[RESUME]'))) continue;
    addMessage(m.role, m.content);
  }
  exchangeCount = history.filter(m => m.role === 'user' && !m.content.startsWith('Begin the discovery') && !m.content.startsWith('[RESUME]')).length;
  updateProgress();
}

(async () => {
  isThinking = true;
  showThinking();
  let resumed = false;
  try {
    const r = await fetch(CAPTURE_ENDPOINT.replace('/intake_capture', '/intake_resume'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId })
    });
    const prior = r.ok ? await r.json() : { found: false };

    // Detect completion robustly: an explicit final flag, OR a WORKSPACE_STATE
    // block present anywhere in the stored transcript. The block's presence is
    // the ground truth that the discovery reached its close — the final flag
    // and the parsed workspace_state can both be absent if the closing JSON
    // failed strict parsing, but the participant still finished.
    let priorRaw = null;
    if (prior.found && Array.isArray(prior.transcript)) {
      for (const m of prior.transcript) {
        if (m.role === 'assistant') {
          const rb = extractWorkspaceRaw(m.content || '');
          if (rb) priorRaw = rb;
        }
      }
    }
    const priorComplete = prior.found && (prior.final || prior.workspace_state || priorRaw);

    if (priorComplete) {
      // Already completed: show their summary again, not a fresh intake.
      hideThinking();
      history = prior.transcript || [];
      renderHistory();
      const lastAssistant = [...history].reverse().find(m => m.role === 'assistant');
      const wsForDisplay = prior.workspace_state
        || (priorRaw ? (extractWorkspaceState('[WORKSPACE_STATE]' + priorRaw + '[/WORKSPACE_STATE]')) : null);
      showCompletion(lastAssistant ? lastAssistant.content : 'Discovery complete.', wsForDisplay);
      isThinking = false;
      return;
    }

    if (prior.found && Array.isArray(prior.transcript) && prior.transcript.length > 0) {
      // Resume: restore full history for voice consistency, then ask for the
      // return greeting. The marker is hidden from display but steers the model.
      history = prior.transcript;
      hideThinking();
      renderHistory();
      // Quiet divider so the returning user knows their earlier answers are above.
      const divider = document.createElement('div');
      divider.style.cssText = 'text-align:center;font-size:11px;color:var(--text-dim);font-weight:300;padding:14px 0;letter-spacing:0.04em;';
      divider.textContent = '— Continuing where you left off · your earlier answers are above —';
      conversation.appendChild(divider);
      showThinking();
      const marker = '[RESUME] The participant has returned to continue this conversation after a break.';
      const greeting = await callModel([...history, { role: 'user', content: marker }]);
      hideThinking();
      history.push({ role: 'user', content: marker });
      history.push({ role: 'assistant', content: greeting });
      addMessage('assistant', greeting);
      captureSession(false, null);
      resumed = true;
    }
  } catch (e) {
    // Resume is best-effort — fall through to a fresh start.
    console.error(e);
  }

  if (!resumed && history.length === 0) {
    try {
      const opening = await callModel([{ role: 'user', content: 'Begin the discovery conversation.' }]);
      hideThinking();
      history.push({ role: 'user',      content: 'Begin the discovery conversation.' });
      history.push({ role: 'assistant', content: opening });
      addMessage('assistant', opening);
      captureSession(false, null);
    } catch (e) {
      hideThinking();
      addMessage('assistant', "I ran into a connection issue starting up. Please refresh the page to begin.");
      console.error(e);
    }
  }
  isThinking = false;
  sendBtn.disabled = userInput.value.trim() === '';
  userInput.focus();
})();
</script>
</body>
</html>
